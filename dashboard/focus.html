<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 MagicQuant 盯盘 · 实时</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1d26 0%, #0d1117 100%);
  color: #e4e6eb;
  min-height: 100vh;
  padding: 20px;
}

.container { max-width: 1400px; margin: 0 auto; }

/* 顶部栏 */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
  background: linear-gradient(135deg, #252833 0%, #1a1d26 100%);
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.logo { font-size: 24px; font-weight: bold; }
.logo .ai { color: #4dabf7; }
.status-bar { display: flex; gap: 20px; align-items: center; font-size: 14px; color: #8b949e; }
.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
.dot.green { background: #3fb950; box-shadow: 0 0 10px #3fb950; animation: pulse 2s infinite; }
.dot.red { background: #f85149; }
.dot.gray { background: #6e7681; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* 网格布局 */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

/* 主标的卡片 */
.master-card {
  background: linear-gradient(135deg, #252833 0%, #1a1d26 100%);
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border: 1px solid #30363d;
}
.master-title {
  font-size: 14px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.master-ticker {
  font-size: 48px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #fff;
}
.master-price {
  font-size: 72px;
  font-weight: bold;
  line-height: 1;
  margin-bottom: 15px;
}
.master-price.up    { color: #3fb950; }
.master-price.down  { color: #f85149; }
.master-price.flat  { color: #e4e6eb; }

.master-indicators {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 25px;
  padding-top: 25px;
  border-top: 1px solid #30363d;
}
.indi {
  text-align: center;
}
.indi-label { font-size: 12px; color: #8b949e; margin-bottom: 5px; }
.indi-value { font-size: 22px; font-weight: bold; }
.indi-value.hot { color: #f85149; }
.indi-value.cold { color: #4dabf7; }
.indi-value.normal { color: #e4e6eb; }

.today-range {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}
.range-item { text-align: center; flex: 1; }
.range-label { color: #8b949e; font-size: 12px; margin-bottom: 4px; }
.range-value { font-size: 18px; font-weight: bold; }

/* 持仓卡片 */
.positions-card {
  background: linear-gradient(135deg, #252833 0%, #1a1d26 100%);
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border: 1px solid #30363d;
}
.section-title {
  font-size: 14px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.position-item {
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
}
.position-item:last-child { margin-bottom: 0; }
.position-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.position-ticker {
  font-size: 22px;
  font-weight: bold;
  color: #fff;
}
.position-pl {
  font-size: 24px;
  font-weight: bold;
}
.position-pl.up   { color: #3fb950; }
.position-pl.down { color: #f85149; }
.position-pl.flat { color: #8b949e; }

.position-details {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  font-size: 13px;
  color: #8b949e;
}
.position-details div {
  text-align: center;
  padding: 6px;
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
}
.position-details div span { color: #e4e6eb; font-weight: bold; display: block; margin-top: 2px; }

.no-position {
  text-align: center;
  padding: 30px;
  color: #6e7681;
  font-style: italic;
}

/* 触发历史 */
.triggers-card {
  background: linear-gradient(135deg, #252833 0%, #1a1d26 100%);
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border: 1px solid #30363d;
  margin-bottom: 20px;
}
.trigger-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: rgba(0,0,0,0.25);
  border-radius: 10px;
  margin-bottom: 10px;
  border-left: 4px solid #6e7681;
}
.trigger-item:last-child { margin-bottom: 0; }
.trigger-item.urgent { border-left-color: #f85149; }
.trigger-item.info   { border-left-color: #3fb950; }
.trigger-item.warn   { border-left-color: #d29922; }

.trigger-info { flex: 1; }
.trigger-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 4px;
  color: #fff;
}
.trigger-meta {
  font-size: 12px;
  color: #8b949e;
}
.trigger-status {
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: bold;
}
.trigger-status.pending   { background: #d29922; color: #000; }
.trigger-status.confirmed { background: #3fb950; color: #000; }
.trigger-status.ignored   { background: #6e7681; color: #fff; }
.trigger-status.timeout   { background: #f85149; color: #fff; }

/* 底部统计 */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
  margin-top: 20px;
}
.stat-item {
  background: linear-gradient(135deg, #252833 0%, #1a1d26 100%);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid #30363d;
}
.stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 28px; font-weight: bold; color: #fff; margin-top: 5px; }

/* 未启动提示 */
.not-active {
  text-align: center;
  padding: 100px 20px;
  color: #8b949e;
}
.not-active .big-emoji { font-size: 80px; margin-bottom: 30px; }
.not-active .big-text { font-size: 28px; margin-bottom: 15px; color: #e4e6eb; }
.not-active .hint { font-size: 16px; margin-top: 20px; }
.not-active code {
  background: #1a1d26;
  padding: 4px 12px;
  border-radius: 6px;
  color: #4dabf7;
  font-family: 'Menlo', monospace;
}

.updated {
  text-align: center;
  color: #6e7681;
  font-size: 12px;
  margin-top: 20px;
}

/* 迷你图 */
.mini-chart {
  height: 80px;
  margin-top: 15px;
  position: relative;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease; }

/* ═══════════════════════════════════════════════
   AI 智囊团面板样式 (v0.3.5)
   ═══════════════════════════════════════════════ */
.ai-panel-container {
  max-width: 1400px;
  margin: 20px auto;
  padding: 0;
}

.ai-panel-title {
  font-size: 20px;
  font-weight: bold;
  padding: 12px 20px;
  background: linear-gradient(135deg, #4dabf7 0%, #7950f2 100%);
  border-radius: 12px 12px 0 0;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ai-panel-title .live-dot {
  width: 8px;
  height: 8px;
  background: #3fb950;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.ai-panel-container .card-body {
  background: #1a1d26;
  border-radius: 0 0 12px 12px;
  padding: 20px;
  border: 1px solid #30363d;
}

.ai-empty {
  text-align: center;
  padding: 40px 20px;
  color: #8b949e;
}

/* 最新决策卡 */
.ai-latest-card {
  background: #0d1117;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}

.ai-latest-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #30363d;
}

.ai-trigger-badge {
  background: linear-gradient(135deg, #fb923c, #f97316);
  color: #fff;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: bold;
}

.ai-timestamp { color: #8b949e; font-size: 13px; }

/* 顾问卡片网格 */
.advisor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.advisor-card {
  background: #161b22;
  border-radius: 8px;
  padding: 14px;
  border-left: 3px solid #4ade80;
}

.advisor-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.advisor-name {
  font-size: 13px;
  color: #8b949e;
  font-weight: bold;
}

.advisor-confidence {
  font-size: 13px;
  color: #4dabf7;
  font-weight: bold;
}

.advisor-action {
  font-size: 16px;
  font-weight: bold;
  margin: 6px 0;
  padding: 6px 10px;
  border-radius: 6px;
}

.action-buy {
  background: rgba(34, 197, 94, 0.15);
  color: #4ade80;
}

.action-sell {
  background: rgba(239, 68, 68, 0.15);
  color: #f87171;
}

.action-hold {
  background: rgba(148, 163, 184, 0.15);
  color: #94a3b8;
}

.advisor-reason, .advisor-risk {
  font-size: 12px;
  margin: 4px 0;
  color: #c9d1d9;
  line-height: 1.5;
}

.advisor-risk {
  color: #fbbf24;
}

.advisor-cost {
  font-size: 11px;
  color: #6e7681;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #30363d;
}

/* Leader 卡片 */
.leader-card {
  background: linear-gradient(135deg, rgba(77, 171, 247, 0.1) 0%, rgba(121, 80, 242, 0.1) 100%);
  border: 2px solid #4dabf7;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
}

.leader-title {
  font-size: 15px;
  font-weight: bold;
  color: #4dabf7;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.leader-differ {
  background: rgba(251, 191, 36, 0.2);
  color: #fbbf24;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}

.leader-action {
  font-size: 22px;
  font-weight: bold;
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 8px;
}

.leader-meta {
  display: flex;
  gap: 8px;
  color: #8b949e;
  font-size: 13px;
  margin-bottom: 10px;
}

.leader-reason {
  color: #e4e6eb;
  font-size: 14px;
  line-height: 1.6;
  padding: 10px 12px;
  background: rgba(77, 171, 247, 0.05);
  border-radius: 6px;
  margin-bottom: 8px;
}

.leader-risk {
  color: #fbbf24;
  font-size: 13px;
  padding: 8px 12px;
  background: rgba(251, 191, 36, 0.08);
  border-radius: 6px;
}

/* 成本汇总 */
.cost-summary {
  background: #161b22;
  border-radius: 8px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.cost-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #c9d1d9;
}

.cost-row strong {
  color: #4dabf7;
  font-size: 15px;
}

/* 历史表 */
.ai-history-section {
  margin-top: 20px;
  background: #0d1117;
  border-radius: 10px;
  padding: 16px;
}

.ai-history-section h3 {
  font-size: 15px;
  color: #8b949e;
  margin-bottom: 10px;
}

.ai-history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.ai-history-table th,
.ai-history-table td {
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid #30363d;
}

.ai-history-table th {
  color: #8b949e;
  font-weight: normal;
  background: #161b22;
}

.ai-history-table tr:hover { background: rgba(77, 171, 247, 0.05); }

@media (max-width: 700px) {
  .cost-summary { grid-template-columns: 1fr; }
  .advisor-grid { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<div class="container" id="app">
  <!-- 初始加载 -->
  <div class="not-active">
    <div class="big-emoji">⏳</div>
    <div class="big-text">正在连接盯盘系统...</div>
  </div>
</div>

<!-- AI 智囊团面板 -->
<div class="ai-panel-container">
  <div class="ai-panel-title">
    <span class="live-dot"></span>
    🤖 AI 智囊团 · 实时建议
    <span style="margin-left:auto; font-size:13px; opacity:0.9;">Focus 触发时自动召集</span>
  </div>
  <div class="card-body">
    <div id="ai-advisor-panel">
      <div class="ai-empty">
        <div style="font-size:32px;">🤖</div>
        <div style="margin-top:10px;">加载中...</div>
      </div>
    </div>
  </div>
</div>

<script>
let lastTriggerCount = 0;

async function fetchState() {
  try {
    const resp = await fetch("/focus/state?t=" + Date.now());
    const state = await resp.json();
    render(state);
  } catch (e) {
    document.getElementById("app").innerHTML = `
      <div class="not-active">
        <div class="big-emoji">⚠️</div>
        <div class="big-text">无法连接盯盘系统</div>
        <div class="hint">请确认 Dashboard Server 正在运行</div>
      </div>
    `;
  }
}

function renderNotActive(state) {
  return `
    <div class="header">
      <div class="logo">🎯 MagicQuant <span class="ai">慧投</span></div>
      <div class="status-bar">
        <span><span class="dot gray"></span>盯盘未启动</span>
      </div>
    </div>
    <div class="not-active">
      <div class="big-emoji">💤</div>
      <div class="big-text">${state.message || "盯盘未启动"}</div>
      <div class="hint">
        请在 Telegram 发送 <code>/focus</code> 启动波段盯盘
      </div>
      <div class="hint" style="margin-top:40px;">
        更新时间: ${state.updated_at}
      </div>
    </div>
  `;
}

function renderActive(state) {
  const m = state.master || {};
  const followers = state.followers || [];
  const triggers = state.triggers || [];
  const stats = state.stats || {};

  // 播放声音:如果新触发数量增加
  if (triggers.length > lastTriggerCount && lastTriggerCount > 0) {
    playTriggerSound();
  }
  lastTriggerCount = triggers.length;

  // 主标的显示
  const rsi = m.rsi_5m;
  const rsiClass = rsi >= 70 ? 'hot' : (rsi <= 35 ? 'cold' : 'normal');
  const rsiStatus = rsi >= 70 ? '🔥超买' : (rsi <= 35 ? '💡超卖' : '正常');

  const vol = m.vol_ratio || 1;
  const volClass = vol >= 1.5 ? 'hot' : (vol <= 0.7 ? 'cold' : 'normal');

  // 涨跌(用 session_low 估算,后续改为昨收)
  const priceNum = parseFloat(m.price) || 0;
  const lowNum = parseFloat(m.low) || priceNum;
  const highNum = parseFloat(m.high) || priceNum;
  const priceClass = priceNum > (lowNum + highNum) / 2 ? 'up' : 'down';

  // 持仓汇总
  let totalPL = 0;
  followers.forEach(f => { totalPL += (f.pl_val || 0); });

  return `
    <div class="header fade-in">
      <div class="logo">🎯 MagicQuant <span class="ai">慧投</span> · 实时盯盘</div>
      <div class="status-bar">
        <span><span class="dot green"></span>运行中 ${state.duration_min} 分钟</span>
        <span>${state.poll_interval}秒/次</span>
        <span>${state.updated_at}</span>
      </div>
    </div>

    <div class="grid">
      <!-- 主标的 -->
      <div class="master-card fade-in">
        <div class="master-title">信号源 · MASTER</div>
        <div class="master-ticker">${m.ticker || '---'}</div>
        <div class="master-price ${priceClass}">
          $${priceNum.toFixed(2)}
        </div>

        <div class="today-range">
          <div class="range-item">
            <div class="range-label">今日低</div>
            <div class="range-value" style="color:#4dabf7;">$${lowNum.toFixed(2)}</div>
          </div>
          <div class="range-item">
            <div class="range-label">当前</div>
            <div class="range-value">$${priceNum.toFixed(2)}</div>
          </div>
          <div class="range-item">
            <div class="range-label">今日高</div>
            <div class="range-value" style="color:#f85149;">$${highNum.toFixed(2)}</div>
          </div>
        </div>

        <div class="master-indicators">
          <div class="indi">
            <div class="indi-label">RSI (5M)</div>
            <div class="indi-value ${rsiClass}">${rsi != null ? rsi.toFixed(0) : '--'}</div>
          </div>
          <div class="indi">
            <div class="indi-label">量比</div>
            <div class="indi-value ${volClass}">${vol.toFixed(2)}x</div>
          </div>
          <div class="indi">
            <div class="indi-label">距高</div>
            <div class="indi-value">${m.dist_high != null ? m.dist_high.toFixed(1) + '%' : '--'}</div>
          </div>
          <div class="indi">
            <div class="indi-label">K线</div>
            <div class="indi-value" style="font-size:14px;">${m.candle ? m.candle.name : '—'}</div>
          </div>
        </div>
      </div>

      <!-- 持仓 -->
      <div class="positions-card fade-in">
        <div class="section-title">💼 我的持仓</div>
        ${followers.filter(f => f.has_position).length === 0
          ? '<div class="no-position">当前空仓<br><br>等待入场信号</div>'
          : followers.filter(f => f.has_position).map(f => {
              const pl = f.pl_val || 0;
              const plp = f.pl_pct || 0;
              const cls = pl > 0 ? 'up' : (pl < 0 ? 'down' : 'flat');
              const sign = pl >= 0 ? '+' : '';
              return `
                <div class="position-item">
                  <div class="position-head">
                    <div class="position-ticker">${f.ticker}</div>
                    <div class="position-pl ${cls}">${sign}$${pl.toFixed(2)}<br><span style="font-size:14px;">${sign}${plp.toFixed(2)}%</span></div>
                  </div>
                  <div class="position-details">
                    <div>数量<span>${f.qty.toFixed(0)}</span></div>
                    <div>成本<span>$${f.cost.toFixed(2)}</span></div>
                    <div>现价<span>$${parseFloat(f.price).toFixed(2)}</span></div>
                  </div>
                </div>
              `;
            }).join('')
        }
      </div>
    </div>

    <!-- 触发历史 -->
    <div class="triggers-card fade-in">
      <div class="section-title">📡 最近信号 (${triggers.length})</div>
      ${triggers.length === 0
        ? '<div class="no-position">暂无信号触发,继续监控中...</div>'
        : triggers.map(t => {
            const levelClass = t.name.includes('target') || t.name.includes('top') ? 'urgent'
              : (t.name.includes('drawdown') ? 'warn' : 'info');
            return `
              <div class="trigger-item ${levelClass}">
                <div class="trigger-info">
                  <div class="trigger-title">${triggerIcon(t.name)} ${t.ticker} · ${triggerLabel(t.name)}</div>
                  <div class="trigger-meta">${t.time} · 建议 ${t.action} ${t.qty > 0 ? t.qty + '股' : ''} ${t.price > 0 ? '@$' + t.price.toFixed(2) : ''}</div>
                </div>
                <div class="trigger-status ${t.status}">${statusLabel(t.status)}</div>
              </div>
            `;
          }).join('')
      }
    </div>

    <!-- 统计 -->
    <div class="stats-bar fade-in">
      <div class="stat-item">
        <div class="stat-label">循环次数</div>
        <div class="stat-value">${stats.loops || 0}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">触发信号</div>
        <div class="stat-value">${stats.triggers || 0}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">推送次数</div>
        <div class="stat-value">${stats.pushes || 0}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">错误</div>
        <div class="stat-value" style="color:${stats.errors > 0 ? '#f85149' : '#fff'}">${stats.errors || 0}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">运行时长</div>
        <div class="stat-value">${state.duration_min} 分</div>
      </div>
    </div>

    <div class="updated">
      最后更新 ${state.updated_at} · 每 2 秒自动刷新
    </div>
  `;
}

function triggerIcon(name) {
  if (name.includes('target')) return '💰';
  if (name.includes('drawdown')) return '🚨';
  if (name.includes('swing_top')) return '🔴';
  if (name.includes('swing_bottom')) return '🟢';
  if (name.includes('rapid')) return '⚡';
  return '📡';
}

function triggerLabel(name) {
  const map = {
    'profit_target_hit':   '浮盈达标',
    'drawdown_from_peak':  '高位回撤',
    'swing_top':           '波段顶',
    'swing_bottom':        '波段底',
    'rapid_move':          '快速异动',
  };
  return map[name] || name;
}

function statusLabel(s) {
  const map = {
    'pending':    '待处理',
    'confirmed':  '已确认',
    'ignored':    '已忽略',
    'timeout':    '超时',
  };
  return map[s] || s;
}

function playTriggerSound() {
  try {
    // 简单的"叮"声,用 Web Audio API 生成
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  } catch (e) {}
}

function render(state) {
  const app = document.getElementById("app");
  if (!state.active) {
    app.innerHTML = renderNotActive(state);
  } else {
    app.innerHTML = renderActive(state);
  }
}

// 每 2 秒刷新
fetchState();
setInterval(fetchState, 2000);

// ─────────────────────────────────────────────────────
// AI 智囊团面板 (v0.3.5)
// ─────────────────────────────────────────────────────

async function fetchAIAdvisor() {
  try {
    const [histRes, costRes] = await Promise.all([
      fetch("/ai_advisor/history"),
      fetch("/ai_advisor/cost"),
    ]);
    const history = await histRes.json();
    const cost = await costRes.json();
    renderAIAdvisor(history, cost);
  } catch (e) {
    console.warn("fetch ai_advisor failed", e);
  }
}

function _emoji(action) {
  return {BUY: "🛒", SELL: "💰", HOLD: "⏸️"}[action] || "❓";
}

function _actionClass(action) {
  return {BUY: "action-buy", SELL: "action-sell", HOLD: "action-hold"}[action] || "";
}

function _formatAction(action, ticker, qty, price) {
  if (action === "HOLD") return "观望 (HOLD)";
  let s = action;
  if (qty > 0) s += " " + qty;
  if (ticker) s += " " + ticker;
  if (price) s += " @$" + Number(price).toFixed(2);
  return s;
}

function _formatTime(iso) {
  try {
    return iso.replace("T", " ").slice(11, 19);
  } catch { return iso; }
}

function renderAIAdvisor(history, cost) {
  const panel = document.getElementById("ai-advisor-panel");
  if (!panel) return;
  
  if (!history || history.length === 0) {
    panel.innerHTML = `
      <div class="ai-empty">
        <div style="font-size:32px;">🤖</div>
        <div style="margin-top:10px;">等待 Focus 触发...</div>
        <div style="color:#6e7681; font-size:12px; margin-top:5px;">
          首次触发后会自动召集 AI 智囊团
        </div>
      </div>
    `;
    return;
  }
  
  const latest = history[history.length - 1];
  const advisors = latest.advisors || {};
  const leader = latest.leader || {};
  const trig = latest.trigger || {};
  
  // 成本汇总
  const todayCost = cost.cost || 0;
  const todayCalls = cost.calls || 0;
  const todayTokens = cost.tokens || 0;
  
  // 顾问显示配置
  const advisorConfig = {
    claude_haiku: {name: "Claude Haiku 4.5", color: "#4ade80", icon: "🟢"},
    deepseek:     {name: "DeepSeek V3",      color: "#fbbf24", icon: "🟡"},
    gpt_5:        {name: "GPT-5",            color: "#c084fc", icon: "🟣"},
  };
  
  // 各顾问的卡片
  const advisorCards = Object.entries(advisors).map(([name, r]) => {
    const cfg = advisorConfig[name] || {name, color: "#8b949e", icon: "⚪"};
    const parseOk = r.parse_ok;
    const emoji = parseOk ? _emoji(r.action) : "❌";
    const actionText = parseOk 
      ? _formatAction(r.action, r.ticker, r.qty, r.price)
      : "响应失败";
    const costStr = r.cost_usd !== undefined ? `$${r.cost_usd.toFixed(4)}` : "-";
    
    return `
      <div class="advisor-card" style="border-left: 3px solid ${cfg.color};">
        <div class="advisor-header">
          <span class="advisor-name">${cfg.icon} ${cfg.name}</span>
          <span class="advisor-confidence">${parseOk ? r.confidence + '%' : '-'}</span>
        </div>
        <div class="advisor-action ${_actionClass(r.action)}">
          ${emoji} ${actionText}
        </div>
        ${parseOk && r.reason ? `<div class="advisor-reason">💭 ${escapeHtml(r.reason)}</div>` : ''}
        ${parseOk && r.risk ? `<div class="advisor-risk">⚠️ ${escapeHtml(r.risk)}</div>` : ''}
        <div class="advisor-cost">${costStr} · ${r.tokens || 0} tokens</div>
      </div>
    `;
  }).join("");
  
  // Leader 最终决策卡
  const leaderOk = leader.parse_ok;
  const leaderEmoji = leaderOk ? _emoji(leader.final_action) : "❌";
  const leaderAction = leaderOk
    ? _formatAction(leader.final_action, leader.final_ticker, leader.final_qty, leader.final_price)
    : "Leader 失败";
  const leaderCost = leader.cost_usd !== undefined ? `$${leader.cost_usd.toFixed(4)}` : "-";
  
  // 历史列表(最近 10 条)
  const recent = history.slice(-10).reverse();
  const historyRows = recent.map(h => {
    const t = _formatTime(h.timestamp || "");
    const trigName = (h.trigger || {}).type || "?";
    const l = h.leader || {};
    const finalAct = l.parse_ok ? _formatAction(l.final_action, l.final_ticker, l.final_qty, l.final_price) : "—";
    const conf = l.confidence || 0;
    const totalCost = h.total_cost_usd || 0;
    return `
      <tr>
        <td>${t}</td>
        <td>${escapeHtml(trigName)}</td>
        <td class="${_actionClass(l.final_action)}">${_emoji(l.final_action)} ${finalAct}</td>
        <td>${conf}%</td>
        <td>$${totalCost.toFixed(4)}</td>
      </tr>
    `;
  }).join("");
  
  panel.innerHTML = `
    <!-- 最新决策 -->
    <div class="ai-latest-card">
      <div class="ai-latest-header">
        <span class="ai-trigger-badge">${escapeHtml(trig.type || "?")}</span>
        <span class="ai-timestamp">${_formatTime(latest.timestamp)}</span>
      </div>
      
      <!-- 3 顾问并列 -->
      <div class="advisor-grid">
        ${advisorCards}
      </div>
      
      <!-- Opus Leader -->
      <div class="leader-card">
        <div class="leader-title">
          🎯 Opus 4.7 Leader 最终决策
          ${leader.differs_from_advisors ? '<span class="leader-differ">⚡ 独立判断</span>' : ''}
        </div>
        <div class="leader-action ${_actionClass(leader.final_action)}">
          ${leaderEmoji} ${leaderAction}
        </div>
        <div class="leader-meta">
          <span>信心 ${leader.confidence || 0}%</span>
          <span>·</span>
          <span>一致性: ${escapeHtml(leader.agreement || "-")}</span>
          <span>·</span>
          <span>${leaderCost}</span>
        </div>
        ${leaderOk && leader.final_reason ? `<div class="leader-reason">📝 ${escapeHtml(leader.final_reason)}</div>` : ''}
        ${leaderOk && leader.risk_warning ? `<div class="leader-risk">⚠️ ${escapeHtml(leader.risk_warning)}</div>` : ''}
      </div>
      
      <!-- 成本汇总 -->
      <div class="cost-summary">
        <div class="cost-row">
          <span>本次花费:</span>
          <strong>$${(latest.total_cost_usd || 0).toFixed(4)}</strong>
          <span style="color:#8b949e;">(${latest.total_tokens || 0} tokens)</span>
        </div>
        <div class="cost-row">
          <span>今日累计:</span>
          <strong>$${todayCost.toFixed(4)}</strong>
          <span style="color:#8b949e;">${todayCalls} 次 · ${todayTokens.toLocaleString()} tokens</span>
        </div>
      </div>
    </div>
    
    <!-- 历史记录 -->
    ${recent.length > 1 ? `
      <div class="ai-history-section">
        <h3>📜 最近触发记录 (${recent.length})</h3>
        <table class="ai-history-table">
          <thead>
            <tr><th>时间</th><th>触发</th><th>最终决策</th><th>信心</th><th>成本</th></tr>
          </thead>
          <tbody>${historyRows}</tbody>
        </table>
      </div>
    ` : ''}
  `;
}

function escapeHtml(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// 启动 AI 智囊团轮询 (每 3 秒)
fetchAIAdvisor();
setInterval(fetchAIAdvisor, 3000);
</script>
